name: CI

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build and Push
    runs-on: build-htz-01
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and push Docker image
        run: |
          docker buildx build --push -t cr.jdbnet.co.uk/public/discord-to-loki:latest .